<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" role="img" aria-labelledby="title desc">
  <title id="title">Roger Federer-inspired realistic avatar</title>
  <desc id="desc">A more realistic shaded SVG portrait of a tennis player inspired by Roger Federer on a soft studio-style background.</desc>
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="34%" r="62%">
      <stop offset="0%" stop-color="#fefefe"/>
      <stop offset="55%" stop-color="#eef6fb"/>
      <stop offset="100%" stop-color="#d9e8ef"/>
    </radialGradient>
    <linearGradient id="shirtFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#21344d"/>
      <stop offset="100%" stop-color="#132030"/>
    </linearGradient>
    <linearGradient id="skinFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f4d3bd"/>
      <stop offset="100%" stop-color="#e6b79d"/>
    </linearGradient>
    <linearGradient id="skinShadow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d9a88d"/>
      <stop offset="100%" stop-color="#b77e62"/>
    </linearGradient>
    <linearGradient id="hairFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8d6a43"/>
      <stop offset="100%" stop-color="#5d3f28"/>
    </linearGradient>
    <linearGradient id="hairLight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ab8457" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ab8457" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="faceHighlight" cx="45%" cy="26%" r="60%">
      <stop offset="0%" stop-color="#fff1e8" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#fff1e8" stop-opacity="0"/>
    </radialGradient>
    <filter id="portraitShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#365368" flood-opacity="0.18"/>
    </filter>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <rect width="640" height="640" rx="72" fill="url(#bgGlow)"/>
  <ellipse cx="320" cy="560" rx="180" ry="24" fill="#b7cdd9" opacity="0.22" filter="url(#softBlur)"/>

  <g filter="url(#portraitShadow)">
    <circle cx="320" cy="314" r="220" fill="#fdfefe"/>

    <path d="M171 510c22-64 67-111 126-134 11 18 17 31 23 43 18 32 34 48 58 48s40-16 58-48c6-12 12-25 23-43 59 23 104 70 126 134v24H171z" fill="url(#shirtFill)"/>
    <path d="M259 392c16 24 35 37 61 37 27 0 46-13 62-37l15-46H244z" fill="url(#skinFill)"/>
    <path d="M320 145c-76 0-123 55-123 137 0 89 51 149 123 149 73 0 123-60 123-149 0-82-47-137-123-137z" fill="url(#skinFill)"/>
    <path d="M208 304c-11-13-30-15-44-5-13 11-15 30-5 44 11 13 31 15 44 5" fill="#e8b598"/>
    <path d="M432 304c11-13 30-15 44-5 13 11 15 30 5 44-11 13-31 15-44 5" fill="#e8b598"/>

    <path d="M190 232c10-83 73-124 146-124 43 0 93 14 123 50 23 27 31 58 24 96-24-19-45-32-88-32-36 0-61 10-90 10-36 0-71-19-115 0z" fill="url(#hairFill)"/>
    <path d="M202 220c21-58 70-93 142-93 51 0 91 16 118 51-18-5-34-7-47-7-38 0-61 15-101 16-37 1-70-9-112 33z" fill="url(#hairLight)" opacity="0.55"/>
    <path d="M221 222c10-36 48-63 95-63 34 0 66 12 88 41-22-10-42-14-61-14-42 0-72 19-122 36z" fill="#6f4f33" opacity="0.72"/>

    <ellipse cx="278" cy="296" rx="26" ry="18" fill="#fff" opacity="0.92"/>
    <ellipse cx="362" cy="296" rx="26" ry="18" fill="#fff" opacity="0.92"/>
    <circle cx="279" cy="298" r="10" fill="#3d3530"/>
    <circle cx="361" cy="298" r="10" fill="#3d3530"/>
    <circle cx="276" cy="295" r="3" fill="#fff" opacity="0.7"/>
    <circle cx="358" cy="295" r="3" fill="#fff" opacity="0.7"/>

    <path d="M245 269c16-15 40-22 64-19" fill="none" stroke="#6b4d37" stroke-linecap="round" stroke-width="9"/>
    <path d="M331 250c24-3 48 4 64 19" fill="none" stroke="#6b4d37" stroke-linecap="round" stroke-width="9"/>

    <path d="M320 315c-4 23-10 42-16 58 10 4 22 5 34 1" fill="none" stroke="#c38b70" stroke-linecap="round" stroke-linejoin="round" stroke-width="7"/>
    <path d="M271 381c15 14 31 21 49 21 18 0 34-7 49-21" fill="none" stroke="#ab5e61" stroke-linecap="round" stroke-width="9"/>
    <path d="M254 353c18 10 39 15 66 15 28 0 49-5 67-15" fill="none" stroke="#d8a285" stroke-linecap="round" stroke-width="5" opacity="0.55"/>

    <path d="M213 349c8 25 18 42 36 56" fill="none" stroke="#cf997f" stroke-linecap="round" stroke-width="7" opacity="0.6"/>
    <path d="M427 349c-8 25-18 42-36 56" fill="none" stroke="#cf997f" stroke-linecap="round" stroke-width="7" opacity="0.6"/>

    <path d="M257 429c16 18 38 28 63 28 26 0 48-10 64-28l18 52c-19 16-47 27-82 27-34 0-62-11-81-27z" fill="#f8fbfc"/>
    <path d="M229 456c24 16 55 24 91 24 38 0 69-8 92-24" fill="none" stroke="#d8e6ee" stroke-width="4"/>

    <path d="M207 486c17 15 37 28 52 34-20 8-41 19-63 36h-67c6-27 18-49 36-70 12-14 26-27 42-39z" fill="#17273a"/>
    <path d="M433 486c16 12 30 25 42 39 18 21 30 43 36 70h-67c-22-17-43-28-63-36 15-6 35-19 52-34z" fill="#17273a"/>
    <path d="M225 482c26 19 59 29 95 29 37 0 70-10 96-29" fill="none" stroke="#2a4868" stroke-width="5" opacity="0.55"/>

    <ellipse cx="320" cy="274" rx="104" ry="142" fill="url(#faceHighlight)" opacity="0.58"/>
    <path d="M226 332c9 44 33 78 94 90-77 5-129-42-129-134 0-29 5-54 15-76-4 20-4 41 1 64 4 17 10 36 19 56z" fill="url(#skinShadow)" opacity="0.18"/>
  </g>
</svg>
